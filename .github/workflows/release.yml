name: Release
on:
  push:
    tags:
      - 'v*'

# Needed to create the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # build.sh runs `git archive HEAD`, which on a tag push is the tagged
      # commit, with .gitattributes export-ignore stripping dev-only files.
      - name: Build plugin zip
        run: |
          ./build.sh
          mv modern_formats.zip "modern_formats-${GITHUB_REF_NAME}.zip"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "modern_formats-${GITHUB_REF_NAME}.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
