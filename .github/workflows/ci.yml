name: CI
on:
  push:
  pull_request:

jobs:
  # Unit tests across every supported PHP version (composer.json: >=8.2).
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, imagick, exif
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: composer test

  # Static analysis + style: version-independent, so run ONCE (cost control).
  # Pinned to the minimum supported PHP (8.2) so php-cs-fixer matches the floor.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: composer cs
      - run: composer stan
